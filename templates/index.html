<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elastic Security | ClearDetect</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- Top Nav (Kibana Style) -->
    <header class="kibana-top-nav">
        <div class="logo-area">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00bfb3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
            <span class="logo-text">ClearDetect SIEM</span>
        </div>
        <div class="user-area">
            <button class="btn-refresh" onclick="exportJSON()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Export JSON
            </button>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="search-section">
        <div class="search-input-wrapper">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" class="search-input" placeholder="Search... (e.g. network.name:&quot;foo&quot; AND process.name:&quot;bar&quot;)">
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        
        <!-- Metric Cards -->
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-value" id="stat-total">0</div>
                <div class="metric-label">Network Events</div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="stat-crit">0</div>
                <div class="metric-label">Critical Alerts</div>
            </div>
            <div class="metric-card">
                <div class="metric-value">1</div>
                <div class="metric-label">Active Agents</div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="stat-src">0</div>
                <div class="metric-label">Unique Source IPs</div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="stat-dst">0</div>
                <div class="metric-label">Unique Destination IPs</div>
            </div>
        </div>

        <!-- Data Table Area -->
        <div class="table-section">
            <div class="table-header">
                <div class="table-title">
                    <h2>Live Threat Stream</h2>
                    <span class="count-badge" id="table-count">0</span>
                </div>
            </div>

            <div class="table-container">
                <table class="elastic-table">
                    <thead>
                        <tr>
                            <th width="3%">SEV</th>
                            <th width="15%">Source IP</th>
                            <th width="15%">Destination IP</th>
                            <th width="25%">Suricata Signature</th>
                            <th width="42%">Explainable AI (eAI) Analysis</th>
                        </tr>
                    </thead>
                    <tbody id="log-container">
                        <!-- Alerts go here -->
                        <tr id="empty-state">
                            <td colspan="5" class="empty-msg">Awaiting network telemetry from Suricata sensor...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        let allAlerts = [];
        let stats = { total: 0, critical: 0 };
        let uniqueSrc = new Set();
        let uniqueDst = new Set();

        async function fetchAlerts() {
            try {
                const response = await fetch('/api/alerts');
                const alerts = await response.json();
                
                const container = document.getElementById('log-container');
                const emptyState = document.getElementById('empty-state');
                
                if (alerts.length > 0 && emptyState) {
                    emptyState.remove();
                }
                
                const existingNodes = new Set(Array.from(container.children).map(n => n.dataset.timestamp));

                alerts.reverse().forEach(alert => { 
                    if (!existingNodes.has(alert.timestamp)) {
                        allAlerts.push(alert);
                        stats.total++;
                        uniqueSrc.add(alert.source_ip);
                        uniqueDst.add(alert.target_ip);
                        
                        const sev = alert.severity.toLowerCase();
                        let dotClass = "dot-low";
                        if (sev === 'critical') { stats.critical++; dotClass = "dot-crit"; }
                        else if (sev === 'high') { dotClass = "dot-high"; }
                        else if (sev === 'medium') { dotClass = "dot-med"; }

                        const tr = document.createElement('tr');
                        tr.className = 'log-row';
                        tr.dataset.timestamp = alert.timestamp;
                        
                        const timeStr = new Date(alert.timestamp).toLocaleTimeString();

                        tr.innerHTML = `
                            <td><div class="sev-dot ${dotClass}" title="${alert.severity}"></div></td>
                            <td><a href="#" class="ip-link">${alert.source_ip}</a><div class="time-sub">${timeStr}</div></td>
                            <td><a href="#" class="ip-link">${alert.target_ip}</a></td>
                            <td class="sig-text">${alert.technical_signature}</td>
                            <td class="eai-text">
                                <div>${alert.plain_english_explanation}</div>
                                <div class="eai-action">Action: ${alert.recommended_action}</div>
                            </td>
                        `;
                        container.prepend(tr);
                    }
                });

                // Update Stats
                document.getElementById('stat-total').innerText = stats.total;
                document.getElementById('stat-crit').innerText = stats.critical;
                document.getElementById('stat-src').innerText = uniqueSrc.size;
                document.getElementById('stat-dst').innerText = uniqueDst.size;
                document.getElementById('table-count').innerText = stats.total;

            } catch (e) {
                console.error("Error fetching telemetry", e);
            }
        }

        function exportJSON() {
            if (allAlerts.length === 0) return alert("No telemetry to export.");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(allAlerts, null, 2));
            const a = document.createElement('a');
            a.href = dataStr;
            a.download = "elastic_telemetry_export.json";
            a.click();
        }

        setInterval(fetchAlerts, 1000);
        fetchAlerts();
    </script>
</body>
</html>
