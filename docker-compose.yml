version: '3.8'

services:
  # The Enterprise Sensor (Real Suricata IDS)
  suricata:
    image: jasonish/suricata:latest
    container_name: suricata-sensor
    network_mode: "host" 
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - NET_RAW
    volumes:
      - ./logs:/var/log/suricata 
    # This command updates the Emerging Threats ruleset, then starts suricata on the eth0 interface
    command: >
      /bin/sh -c "suricata-update && suricata -i eth0"

  # The AI Brain (XAI-Translator)
  xai-dashboard:
    build: .
    container_name: xai-dashboard
    network_mode: "host"
    volumes:
      - ./logs:/app/logs 
    depends_on:
      - suricata
